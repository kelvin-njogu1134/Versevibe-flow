<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Verse vibe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to your account</p>

            <form id="login-form">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
                    </div>
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn btn-primary">Log In</button>
            </form>

            <div class="form-footer">
                <p>Don't have an account? <a href="index.html">Sign up</a></p>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { loginUser, onAuthStateChanged, redirectIfAuthenticated } from './auth.js';

        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error-message');

        onAuthStateChanged((user) => {
            if (user) redirectIfAuthenticated(user);
        });

        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🙈';
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.textContent = '';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                errorDiv.textContent = 'Please fill in both fields.';
                return;
            }

            try {
                const user = await loginUser(email, password);
                redirectIfAuthenticated(user);
            } catch (error) {
                let friendlyMsg = '';
                switch (error.code) {
                    case 'auth/user-not-found':
                        friendlyMsg = 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        friendlyMsg = 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        friendlyMsg = 'Invalid email format.';
                        break;
                    case 'auth/too-many-requests':
                        friendlyMsg = 'Too many failed attempts. Try again later.';
                        break;
                    default:
                        friendlyMsg = error.message || 'Login failed. Please try again.';
                }
                errorDiv.textContent = friendlyMsg;
            }
        });
    </script>
</body>
</html>
