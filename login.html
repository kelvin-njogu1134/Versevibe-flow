<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VerseVibe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #258fa1 0%, #0092e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Professional form styling – no container card */
        .login-form {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2);
            transition: transform 0.2s ease;
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #475569;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #1e293b;
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
            background: white;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 2.8rem;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            text-align: center;
            border-left: 4px solid #ef4444;
        }

        .form-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #475569;
        }

        .form-footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .login-form {
                padding: 2rem 1.5rem;
            }
            h2 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-form">
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to your account</p>

        <form id="login-form">
            <div class="input-group">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
                </div>
            </div>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <button type="submit" class="btn btn-primary">Log In</button>
        </form>

        <div class="form-footer">
            <p>Don't have an account? <a href="index.html">Sign up</a></p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { loginUser, onAuthStateChanged, redirectIfAuthenticated } from './auth.js';

        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error-message');

        onAuthStateChanged((user) => {
            if (user) redirectIfAuthenticated(user);
        });

        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🙈';
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                errorDiv.textContent = 'Please fill in both fields.';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const user = await loginUser(email, password);
                redirectIfAuthenticated(user);
            } catch (error) {
                let friendlyMsg = '';
                switch (error.code) {
                    case 'auth/user-not-found':
                        friendlyMsg = 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        friendlyMsg = 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        friendlyMsg = 'Invalid email format.';
                        break;
                    case 'auth/too-many-requests':
                        friendlyMsg = 'Too many failed attempts. Try again later.';
                        break;
                    default:
                        friendlyMsg = error.message || 'Login failed. Please try again.';
                }
                errorDiv.textContent = friendlyMsg;
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
