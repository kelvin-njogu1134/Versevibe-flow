<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h2>Create Account</h2>
            <p class="subtitle">Join us today</p>

            <form id="signup-form">
                <div class="input-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Create a strong password" required autocomplete="new-password">
                        <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
                    </div>
                    <div class="password-hint">Minimum 6 characters</div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password" aria-label="Show password">👁️</button>
                    </div>
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>

            <div class="form-footer">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
            }
        }
    </script>
    <script type="module">
        import { signUpUser, onAuthStateChanged, redirectIfAuthenticated } from './auth.js';

        const form = document.getElementById('signup-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const errorDiv = document.getElementById('error-message');

        onAuthStateChanged((user) => {
            if (user) redirectIfAuthenticated(user);
        });

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🙈';
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.textContent = '';

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;

            if (!email || !password || !confirm) {
                errorDiv.textContent = 'Please fill in all fields.';
                return;
            }
            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match.';
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters.';
                return;
            }
            const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            if (!emailPattern.test(email)) {
                errorDiv.textContent = 'Please enter a valid email address.';
                return;
            }

            // Prevent signup with admin email
            if (email === 'admin@secureapp.com') {
                errorDiv.textContent = 'This email is reserved. Please use another email.';
                return;
            }

            try {
                await signUpUser(email, password);
                // onAuthStateChanged will handle redirect
            } catch (error) {
                let friendlyMsg = '';
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        friendlyMsg = 'An account with this email already exists.';
                        break;
                    case 'auth/weak-password':
                        friendlyMsg = 'Weak password. Use at least 6 characters.';
                        break;
                    case 'auth/invalid-email':
                        friendlyMsg = 'Invalid email format.';
                        break;
                    default:
                        friendlyMsg = error.message || 'Signup failed. Please try again.';
                }
                errorDiv.textContent = friendlyMsg;
            }
        });
    </script>
</body>
</html>
